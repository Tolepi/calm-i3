###############################################################
#
#                    ALACRITTY
#
# Inspirado en el rice de la captura.
# Minimalista, limpio y sin distracciones.
#
###############################################################

###############################################################
# VENTANA
###############################################################

[window]

# Espacio entre el borde y el contenido
padding = { x = 15, y = 15 }

# Sin barra de título
decorations = "None"

# Fondo completamente sólido
opacity = 1.0

# No abrir maximizado
startup_mode = "Windowed"

# Scrollback suficiente para trabajar
dynamic_padding = false

###############################################################
# FUENTE
###############################################################

[font]

size = 10.0

normal = { family = "Iosevka Term  Light", style = "Text" }

bold = { family = "Iosevka Term Light", style = "Medium" }

italic = { family = "Iosevka Term Light", style = "Italic" }

bold_italic = { family = "Iosevka Term Light", style = "Medium Italic" }

offset = { x = 0, y = 1 }

###############################################################
# CURSOR
###############################################################

[cursor]

style = { shape = "Block", blinking = "Off" }

unfocused_hollow = false

###############################################################
# SCROLL
###############################################################

[scrolling]

history = 10000

multiplier = 3

###############################################################
# COLORES
###############################################################

[colors.primary]

background = "#F3EFE3"
foreground = "#202020"

###############################################################
# CURSOR
###############################################################

[colors.cursor]

text = "#F3EFE3"
cursor = "#111111"

###############################################################
# SELECCIÓN
###############################################################

[colors.selection]

text = "#F3EFE3"
background = "#111111"

###############################################################
# NORMAL
###############################################################

[colors.normal]

black = "#202020"
red = "#8E5B5B"
green = "#6C8266"
yellow = "#A08963"
blue = "#5F7A8D"
magenta = "#8A6B8C"
cyan = "#5F8787"
white = "#D9D4C8"

###############################################################
# BRIGHT
###############################################################

[colors.bright]

black = "#555555"
red = "#A36A6A"
green = "#86A07E"
yellow = "#B79C73"
blue = "#7291A8"
magenta = "#9E81A0"
cyan = "#78A0A0"
white = "#FFFFFF"

###############################################################
# CAMPANA
###############################################################

[bell]

animation = "EaseOutExpo"

duration = 0

###############################################################
# RATÓN
###############################################################

[mouse]

hide_when_typing = true

###############################################################
# GENERAL
###############################################################

[general]

live_config_reload = true
